# Default configuration
defaults:
  # IARU region affects band plans limits (start and end frequencies).
  # 1 = Europe/Africa, 2 = Americas, 3 = Asia-Pacific.
  # These values determine regional band limits unless overridden per-band.
  iaru_region: 1

  # Drive power (in watts) used during TUNE procedure.
  # IMPORTANT: RF2K-S requires tuning power between 4 and 39 W.
  # If the power is outside this range, the amplifier tuner will not activate.
  # Although tuning works from 4 W, at least 10 W is recommended for best results.
  # Default is 13 W which is both safe and effective.
  tune_power: 13

  # Enable audible beep before each tuning step (true/false).
  # Helps indicate when to manually start tuning on the amplifier.
  use_beep: true

  # Require manual confirmation (press ENTER) before each tuning step (true/false).
  # Set to true for safer, step-by-step tuning. False for automatic tuning with countdown.
  prompt_before_each_tune: false

# FlexRadio connection settings
flexradio:
  host: 192.168.20.100  # Hostname or IP address of the FlexRadio server
  port: 4992 # Port number for FlexRadio connection, 4992 is the default for FlexRadio
  client_id: "flex_rf2k_trainer" # Unique client identifier for FlexRadio, do not alter

# Amplifier configuration
rf2k_s:
  enabled: true # Enable or disable communication with the RF2K-S amplifier
  host: 192.168.20.200 # Hostname or IP address of the RF2K-S amplifier
  port: 8080 # Port number for RF2K-S amplifier connection, 8080 is the default for RF2K-S

# Band-specific settings
# Each band can be enabled or disabled, and you can set a band specific tuning power.
# Custom band limits can be set, but they will override the IARU region defaults.
# If you do not need to override the defaults, you can leave these commented out.
# It's recommended to keep the band limits commented out unless you have specific requirements
# and know exactly what you are doing as it may lead to incorrect tuning if set improperly.
# You have been warned!
bands:
  160m:
    enabled: false # Enable or disable tuning for 160m band, true means enabled
    # tune_power: 13 # Uncomment and set custom tuning power if needed, otherwise default will be used
    # band_start: 1800
    # band_end: 2000

